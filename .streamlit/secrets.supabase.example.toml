# Copy these values into Streamlit Community Cloud app secrets.
# Do not commit a real secrets.toml file.

ODDS_API_KEY = "your-odds-api-key"
MLB_STATS_API_MARKER = ""

# Supabase project credentials.
# Use the Postgres connection string from Supabase Project Settings > Database.
# Prefer the pooled/session connection string for hosted apps.
SUPABASE_DB_URL = "postgresql://postgres.your-project-ref:your-password@aws-0-us-east-1.pooler.supabase.com:5432/postgres"

# Keep false after you have run supabase_schema.sql once in Supabase SQL Editor.
RUN_SUPABASE_SCHEMA_ON_START = "false"

PYBASEBALL_CACHE = "data/pybaseball_cache"
MPLCONFIGDIR = "data/matplotlib_config"
DASHBOARD_PASSWORD = ""
